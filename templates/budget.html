<!DOCTYPE html>
<html>
<head>
    <title>Set Budget</title>
</head>

<body>

    <h1>Set Trip Budget</h1>

    <form method="POST">

        <label>Budget Amount (₹):</label>

        <input type="number"
               step="0.01"
               name="budget"
               required>

        <br><br>

        <button type="submit">
            Save Budget
        </button>

    </form>

    <br>

    <a href="/dashboard">
        Back to Dashboard
    </a>

</body>
</html>
