<!DOCTYPE html>
<html>
<head>
    <title>Set Budget</title>
</head>

<body>

<h1>Set Trip Budget</h1>

<form method="POST">

    <label>Select Trip:</label>

    <select name="trip_id" required>

        {% for trip in trips %}
        <option value="{{ trip.id }}">
            {{ trip.trip_name }}
        </option>
        {% endfor %}

    </select>

    <br><br>

    <label>Budget Amount (₹):</label>

    <input
        type="number"
        step="0.01"
        name="budget"
        required>

    <br><br>

    <button type="submit">
        Save Budget
    </button>

</form>

<br>

<a href="/dashboard">
    Back to Dashboard
</a>

</body>
</html>
