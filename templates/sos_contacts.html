<!DOCTYPE html>
<html>
<head>
    <title>SOS Contacts</title>

    <style>

        body{
            text-align:center;
            font-family:Arial;
        }

        .btn{
            background:red;
            color:white;
            padding:15px 25px;
            text-decoration:none;
            border-radius:10px;
            display:inline-block;
            margin:10px;
        }

    </style>

</head>
<body>

<h1>🚨 Emergency Contacts</h1>

<p>Tap each button to send your LIVE location.</p>

{% for contact in contact_links %}

    <h3>{{ contact.name }}</h3>

    <a class="btn"
       href="{{ contact.link }}"
       target="_blank">

        Send to {{ contact.name }}

    </a>

{% endfor %}

<br><br>

<a href="/dashboard">
    Back to Dashboard
</a>

</body>
</html>
