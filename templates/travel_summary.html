<!DOCTYPE html>
<html>
<head>
    <title>AI Travel Summary</title>

    <style>

        body{
            font-family: Arial;
            background:#f4f4f4;
            padding:40px;
        }

        .container{
            background:white;
            padding:30px;
            border-radius:10px;
            width:70%;
            margin:auto;
            box-shadow:0px 0px 10px gray;
        }

        h1{
            text-align:center;
            color:#2c3e50;
        }

        ul{
            line-height:2;
            font-size:18px;
        }

    </style>

</head>

<body>

<div class="container">

<h1>🤖 AI Travel Summary Generator</h1>

<ul>

{% for line in summary %}

<li>{{ line }}</li>

{% endfor %}

</ul>

</div>

</body>
</html>
