<!DOCTYPE html>
<html>
<head>
    <title>Expense Tracker</title>

    <style>
        body{
            font-family: Arial;
            background:#f4f6f9;
            margin:20px;
        }

        .container{
            width:500px;
            margin:auto;
            background:white;
            padding:20px;
            border-radius:10px;
            box-shadow:0 0 10px rgba(0,0,0,0.1);
        }

        input, select{
            width:100%;
            padding:10px;
            margin-bottom:15px;
        }

        button{
            background:#007bff;
            color:white;
            border:none;
            padding:10px;
            width:100%;
            cursor:pointer;
        }

        button:hover{
            background:#0056b3;
        }
    </style>

</head>

<body>

<div class="container">

<h1>Expense Tracker</h1>

<form method="POST">

    <label>Select Trip</label>

    <select name="trip_id" required>

        {% for trip in trips %}

        <option value="{{ trip.id }}">
            {{ trip.trip_name }}
        </option>

        {% endfor %}

    </select>


    <label>Category</label>

    <input
        type="text"
        name="category"
        placeholder="Food, Transport, Hotel..."
        required
    >


    <label>Amount</label>

    <input
        type="number"
        step="0.01"
        name="amount"
        placeholder="Enter amount"
        required
    >


    <label>Description</label>

    <input
        type="text"
        name="description"
        placeholder="Enter description"
    >


    <button type="submit">
        Save Expense
    </button>

</form>

</div>

</body>
</html>
